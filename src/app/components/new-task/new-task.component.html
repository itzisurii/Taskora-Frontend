<body class="bg-[#F4F1EA] dark:bg-zinc-950 overflow-hidden">
    <div
        class="relative flex h-screen w-full flex-col overflow-hidden opacity-20 blur-[12px] pointer-events-none scale-[0.98]">
        <div class="layout-container flex h-full grow flex-col">
            <header class="flex items-center justify-between border-b border-black/5 bg-white px-10 py-5">
                <div class="flex items-center gap-8">
                    <div class="flex items-center gap-3">
                        <div class="text-charcoal"><span class="material-symbols-outlined text-2xl">adjust</span></div>
                        <h2 class="text-lg font-semibold tracking-widest uppercase">Taskora</h2>
                    </div>
                </div>
                <div class="size-8 rounded-full bg-charcoal/5 border border-charcoal/10"></div>
            </header>
            <div class="flex flex-1 overflow-hidden">
                <aside class="w-64 border-r border-black/5 p-8 flex flex-col gap-6 bg-white">
                    <div class="space-y-4">
                        <div class="h-4 w-3/4 bg-black/5 rounded"></div>
                        <div class="h-4 w-1/2 bg-black/5 rounded"></div>
                    </div>
                </aside>
                <main class="flex-1 p-16">
                    <div class="max-w-4xl mx-auto">
                        <div class="h-12 w-64 bg-black/5 rounded mb-8"></div>
                        <div class="h-96 w-full bg-white rounded-3xl border border-black/5"></div>
                    </div>
                </main>
            </div>
        </div>
    </div>
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/10 backdrop-blur-sm">
        <div
            class="w-full max-w-2xl luxury-glass rounded-3xl shadow-[0_50px_100px_-30px_rgba(0,0,0,0.12)] overflow-hidden transition-all duration-700">
            <div class="flex items-center justify-between px-12 pt-12 pb-10">
                <div>
                    <h3 class="text-4xl font-serif text-charcoal italic tracking-tight">
                        New Task
                    </h3>
                    <p class="text-[10px] text-soft-gray mt-3 font-semibold uppercase tracking-[0.25em] opacity-50">
                        Private Management • Executive Suite</p>
                </div>
                <button
                    class="size-10 flex items-center justify-center rounded-full hover:bg-black/5 text-soft-gray transition-colors">
                    <span class="material-symbols-outlined text-xl">close</span>
                </button>
            </div>
            <form class="px-12 pb-6 space-y-10">
                <div class="flex flex-col gap-3">
                    <label class="text-[11px] font-medium text-refined-gray uppercase tracking-[0.15em] ml-0.5"
                        for="task-title">Title</label>
                    <input
                        class="w-full px-0 py-4 bg-transparent border-t-0 border-l-0 border-r-0 border-b border-border-light focus:border-charcoal focus:ring-0 text-2xl font-serif italic text-charcoal placeholder:text-soft-gray/20 transition-all outline-none"
                        id="task-title" placeholder="What is to be accomplished?" type="text" />
                </div>
                <div class="flex flex-col gap-3">
                    <label class="text-[11px] font-medium text-refined-gray uppercase tracking-[0.15em] ml-0.5"
                        for="task-desc">Details</label>
                    <textarea
                        class="w-full px-6 py-5 rounded-2xl luxury-input text-[15px] leading-relaxed resize-none border"
                        id="task-desc" placeholder="Specify requirements or nuances..." rows="3"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-10">
                    <div class="flex flex-col gap-3">
                        <label class="text-[11px] font-medium text-refined-gray uppercase tracking-[0.15em] ml-0.5"
                            for="due-date">Deadline</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-soft-gray text-[18px] pointer-events-none opacity-60">calendar_today</span>
                            <input
                                class="w-full pl-14 pr-6 py-4 rounded-2xl luxury-input text-[14px] border uppercase tracking-wider"
                                id="due-date" type="date" />
                        </div>
                    </div>
                    <div class="flex flex-col gap-3">
                        <label class="text-[11px] font-medium text-refined-gray uppercase tracking-[0.15em] ml-0.5"
                            for="priority">Priority</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-soft-gray text-[18px] pointer-events-none opacity-60">layers</span>
                            <select
                                class="w-full pl-14 pr-10 py-4 rounded-2xl luxury-input text-[14px] appearance-none border"
                                id="priority">
                                <option value="low">Standard</option>
                                <option selected="" value="medium">Elevated</option>
                                <option value="high">Critical</option>
                            </select>
                            <span
                                class="material-symbols-outlined absolute right-5 top-1/2 -translate-y-1/2 text-soft-gray text-[18px] pointer-events-none opacity-40">expand_more</span>
                        </div>
                    </div>
                </div>
                <div class="flex flex-col gap-4">
                    <label
                        class="text-[11px] font-medium text-refined-gray uppercase tracking-[0.15em] ml-0.5">Categorization</label>
                    <div class="flex flex-wrap gap-3">
                        <button
                            class="px-6 py-2.5 rounded-full text-[11px] font-bold bg-charcoal text-white gold-button-glow transition-all uppercase tracking-widest"
                            type="button">Strategic</button>
                        <button
                            class="px-6 py-2.5 rounded-full text-[11px] font-bold bg-white/40 border border-border-light text-soft-gray hover:border-charcoal/20 hover:text-charcoal transition-all uppercase tracking-widest"
                            type="button">Creative</button>
                        <button
                            class="px-6 py-2.5 rounded-full text-[11px] font-bold bg-white/40 border border-border-light text-soft-gray hover:border-charcoal/20 hover:text-charcoal transition-all uppercase tracking-widest"
                            type="button">Logistics</button>
                        <button
                            class="flex items-center gap-2 px-5 py-2.5 rounded-full text-[11px] font-bold border border-dashed border-soft-gray/30 text-soft-gray hover:bg-white/50 transition-all uppercase tracking-widest"
                            type="button">
                            <span class="material-symbols-outlined text-sm">add</span> Add Tag
                        </button>
                    </div>
                </div>
            </form>
            <div class="px-12 py-12 flex justify-end items-center gap-10">
                <button
                    class="text-[12px] font-bold text-charcoal/60 hover:text-charcoal tracking-[0.2em] transition-all uppercase">
                    Dismiss
                </button>
                <button
                    class="px-12 py-5 bg-charcoal text-white text-[12px] font-bold rounded-full gold-button-glow hover:-translate-y-1 active:translate-y-0 transition-all flex items-center gap-4 uppercase tracking-[0.25em]">
                    Save Task
                    <span class="material-symbols-outlined text-[16px] opacity-70">arrow_right_alt</span>
                </button>
            </div>
        </div>
    </div>

</body>
