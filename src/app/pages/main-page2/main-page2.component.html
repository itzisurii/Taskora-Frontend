<body class="antialiased overflow-hidden">
    <div class="relative flex min-h-screen w-full flex-col">
        <div class="fixed top-0 left-0 w-full z-50">
            <div class="progress-line">
                <div class="progress-active"></div>
            </div>
        </div>
        <header class="w-full py-8 px-12 flex justify-between items-center">
            <div class="flex items-center gap-4">
                    <div class="flex h-7 w-7 items-center justify-center border border-primary/20 rounded-full">
                        <span class="material-symbols-outlined !text-lg text-primary">circle_notifications</span>
                    </div>
                    <h1
                        class="text-lg font-medium tracking-[0.2em] uppercase text-primary dark:text-accent font-serif-refined">
                        Taskora</h1>
                </div>
            <div class="text-[10px] tracking-[0.2em] uppercase text-slate-400 font-medium">
                Step 02 <span class="mx-2 opacity-30">/</span> 03
            </div>
        </header>
        <main class="flex-1 flex items-center justify-center px-6 pb-12">
            <div class="w-full max-w-xl">
                <div class="flex justify-center mb-8">
                    <span class="material-symbols-outlined !text-3xl text-accent/60">auto_awesome</span>
                </div>
                <div class="glass-card rounded-3xl p-12 md:p-16 text-center">
                    <header class="mb-12">
                        <h2 class="text-4xl md:text-5xl font-medium text-primary font-serif-refined leading-tight">
                            Personalize Your <span class="italic">Atelier</span>
                        </h2>
                        <p class="mt-4 text-sm font-light text-slate-500 tracking-wide uppercase">Define the space where
                            your best work happens.</p>
                    </header>
                    <form class="space-y-12 text-left">
                        <div class="space-y-1">
                            <label class="text-[10px] uppercase tracking-[0.2em] font-semibold text-accent"
                                for="atelier-name">Atelier Name</label>
                            <input class="input-luxury w-full placeholder:text-slate-300" id="atelier-name"
                                placeholder="e.g., Creative Studio, Executive Suite" type="text" />
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] uppercase tracking-[0.2em] font-semibold text-accent"
                                for="primary-focus">Primary Focus</label>
                            <select class="input-luxury w-full appearance-none cursor-pointer" id="primary-focus">
                                <option disabled="" selected="" value="">Select your domain</option>
                                <option value="strategy">Strategic Leadership</option>
                                <option value="creative">Creative Direction</option>
                                <option value="development">Product Engineering</option>
                                <option value="growth">Growth &amp; Expansion</option>
                            </select>
                        </div>
                        <div class="pt-6">
                            <button
                                class="w-full bg-primary py-5 text-[11px] uppercase tracking-[0.25em] font-bold text-white transition-all hover:bg-opacity-95 hover:shadow-2xl hover:shadow-primary/20 flex items-center justify-center gap-2 group">
                                Continue to Workspace
                                <span
                                    class="material-symbols-outlined !text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
                            </button>
                            <p
                                class="mt-6 text-center text-[10px] text-slate-400 tracking-widest uppercase font-medium cursor-pointer hover:text-accent transition-colors">
                                I'll set this up later
                            </p>
                        </div>
                    </form>
                </div>
            </div>
        </main>
        <footer class="py-10 px-12">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="flex gap-8">
                    <a class="text-[9px] uppercase tracking-[0.2em] text-slate-400 hover:text-primary transition-colors"
                        href="#">Guidelines</a>
                    <a class="text-[9px] uppercase tracking-[0.2em] text-slate-400 hover:text-primary transition-colors"
                        href="#">Philosophy</a>
                </div>
                <p class="text-[9px] uppercase tracking-[0.2em] text-slate-300 font-medium">© 2023 Taskora Atelier.
                    Handcrafted Excellence.</p>
            </div>
        </footer>
    </div>

</body>
