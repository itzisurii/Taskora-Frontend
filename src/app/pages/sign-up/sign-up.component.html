<body class="bg-subtle-gradient min-h-screen font-sans">
    <div class="flex min-h-screen flex-col items-center justify-center p-6 sm:p-12">
        <div class="mb-12 flex flex-col items-center gap-4">
            <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-charcoal text-ivory">
                <span class="material-symbols-outlined text-2xl">auto_awesome</span>
            </div>
            <h2 class="font-serif text-3xl font-medium tracking-tight italic">Taskora</h2>
        </div>
        <div
            class="w-full max-w-[540px] rounded-5xl glass-effect p-10 sm:p-14 shadow-[0_32px_64px_-12px_rgba(0,0,0,0.08)]">
            <div class="mb-12 text-center">
                <h1 class="font-serif text-4xl font-medium text-charcoal">Begin your journey</h1>
                <p class="mt-4 text-sm font-medium uppercase tracking-[0.2em] text-slate-muted/70">A calm space for your
                    productivity</p>
            </div>
            <form class="space-y-8" onsubmit="return false;">
                <div class="grid grid-cols-1 gap-8">
                    <div class="group">
                        <label class="block text-xs font-bold uppercase tracking-widest text-charcoal/60 mb-3 ml-1"
                            for="full_name">Full Name</label>
                        <div class="relative">
                            <input
                                class="block w-full border-0 border-b-2 border-charcoal/10 bg-transparent py-4 px-1 text-charcoal placeholder:text-charcoal/30 focus:border-charcoal focus:ring-0 transition-all outline-none text-lg"
                                id="full_name" name="full_name" placeholder="Johnathan Doe" type="text" />
                        </div>
                    </div>
                    <div class="group">
                        <label class="block text-xs font-bold uppercase tracking-widest text-charcoal/60 mb-3 ml-1"
                            for="email">Email Address</label>
                        <div class="relative">
                            <input
                                class="block w-full border-0 border-b-2 border-charcoal/10 bg-transparent py-4 px-1 text-charcoal placeholder:text-charcoal/30 focus:border-charcoal focus:ring-0 transition-all outline-none text-lg"
                                id="email" name="email" placeholder="hello@domain.com" type="email" />
                        </div>
                    </div>
                    <div class="group">
                        <div class="flex justify-between items-end mb-3 ml-1">
                            <label class="block text-xs font-bold uppercase tracking-widest text-charcoal/60"
                                for="password">Create Password</label>
                        </div>
                        <div class="relative">
                            <input
                                class="block w-full border-0 border-b-2 border-charcoal/10 bg-transparent py-4 px-1 text-charcoal placeholder:text-charcoal/30 focus:border-charcoal focus:ring-0 transition-all outline-none text-lg"
                                id="password" name="password" placeholder="••••••••" type="password" />
                        </div>
                    </div>
                    <div class="group">
                        <label class="block text-xs font-bold uppercase tracking-widest text-charcoal/60 mb-3 ml-1"
                            for="confirm_password">Verify Password</label>
                        <div class="relative">
                            <input
                                class="block w-full border-0 border-b-2 border-charcoal/10 bg-transparent py-4 px-1 text-charcoal placeholder:text-charcoal/30 focus:border-charcoal focus:ring-0 transition-all outline-none text-lg"
                                id="confirm_password" name="confirm_password" placeholder="••••••••" type="password" />
                        </div>
                    </div>
                </div>
                <div class="pt-6">
                    <button
                        class="btn-premium w-full rounded-full py-5 text-sm font-bold uppercase tracking-[0.2em] shadow-xl flex items-center justify-center gap-3"
                        type="submit">
                        <span>Create Account</span>
                        <span class="material-symbols-outlined text-base">north_east</span>
                    </button>
                </div>
                <div class="relative my-10 flex items-center">
                    <div class="flex-grow border-t border-charcoal/10"></div>
                    <span
                        class="mx-6 flex-shrink text-[10px] font-bold uppercase tracking-[0.3em] text-slate-muted/50">Discovery
                        via</span>
                    <div class="flex-grow border-t border-charcoal/10"></div>
                </div>
                <div class="grid grid-cols-2 gap-6">
                    <button
                        class="flex items-center justify-center gap-3 rounded-full border border-charcoal/10 py-3.5 px-4 text-[11px] font-bold uppercase tracking-widest text-charcoal/70 hover:bg-white hover:border-charcoal/30 transition-all"
                        type="button">
                        <img alt="Google" class="h-4 w-4 opacity-70"
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuC9Cim55Lab6Swm5emNnZQ9KGOw9sDTeSS9VQOk7S0F7rTdKsZFpklv1vi2ZRkGXwGr85bMUbgqrq-NEOuJj4jy94w0YPijZBG7r4db0GPCvQvDq7J6DOGu2Cf-8mD4fADj7Rc1mpT6igF-27sgRGUO-xWel_bCuj7MCRbkuMACS7QXQ8jsyjU09hkIwXqMRPUy5H_NH9ZLdkQgE7zkuldmRYj18wQhS0mFGYWgNIM82lfLU2YfvFkULZk6dDIVjTJTpMixrkDSGog" />
                        Google
                    </button>
                    <button
                        class="flex items-center justify-center gap-3 rounded-full border border-charcoal/10 py-3.5 px-4 text-[11px] font-bold uppercase tracking-widest text-charcoal/70 hover:bg-white hover:border-charcoal/30 transition-all"
                        type="button">
                        <span class="material-symbols-outlined text-lg opacity-70">account_circle</span>
                        Github
                    </button>
                </div>
            </form>
            <div class="mt-14 text-center">
                <p class="text-sm text-slate-muted font-medium">
                    Part of the community?
                    <a class="text-charcoal font-bold hover:text-gold-glow transition-colors ml-1" href="#">Sign in</a>
                </p>
                <p
                    class="mt-8 text-[10px] leading-loose uppercase tracking-widest text-slate-muted/40 max-w-xs mx-auto">
                    By entering, you accept our
                    <a class="underline hover:text-charcoal transition-colors" href="#">Terms</a> &amp;
                    <a class="underline hover:text-charcoal transition-colors" href="#">Privacy Policy</a>
                </p>
            </div>
        </div>
        <div class="mt-16 flex flex-wrap justify-center gap-12 opacity-40">
            <div class="flex items-center gap-3 text-[10px] font-bold uppercase tracking-[0.2em] text-charcoal">
                <span class="material-symbols-outlined text-sm">encrypted</span>
                Encryption Secured
            </div>
            <div class="flex items-center gap-3 text-[10px] font-bold uppercase tracking-[0.2em] text-charcoal">
                <span class="material-symbols-outlined text-sm">workspace_premium</span>
                Premium Experience
            </div>
        </div>
    </div>

</body>
